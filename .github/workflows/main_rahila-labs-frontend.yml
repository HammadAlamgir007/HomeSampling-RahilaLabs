# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - rahila-labs-frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: npm install and build
        env:
          NEXT_PUBLIC_API_URL: https://rahila-labs-api-fafua2dphucrafdd.southeastasia-01.azurewebsites.net
        run: |
          npm install
          npm run build
          
          # 1. Next.js 'standalone' output doesn't include public/ or .next/static/
          # We must copy them into the standalone dir manually
          cp -r public .next/standalone/ || true
          mkdir -p .next/standalone/.next
          cp -r .next/static .next/standalone/.next/
          
          # 2. Prevent Azure Kudu from running 'npm install' or Oryx on the server
          # We create the .deployment file as a backup, but the main fix is in the deploy step
          echo "[config]" > .next/standalone/.deployment
          echo "SCM_DO_BUILD_DURING_DEPLOYMENT=false" >> .next/standalone/.deployment
          
          # 3. Ensure Next.js standalone package.json 'start' script points to server.js
          node -e "let p=require('./.next/standalone/package.json');p.scripts=p.scripts||{};p.scripts.start='node server.js';require('fs').writeFileSync('./.next/standalone/package.json',JSON.stringify(p,null,2))"

      - name: Zip artifact for deployment
        run: |
          cd .next/standalone
          zip -r ../../release.zip .

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Unzip artifact for deployment
        run: unzip release.zip
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_ED3B07FA63834BEDB5FDD1A38A4CADB1 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_27E6AE6E0B0F434BAA21F75094644D6F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_2453D8B19F8346C1A0A4F35769416065 }}

      - name: Disable Oryx Build and Set Startup Command on Azure
        run: |
          RG=$(az webapp list --query "[?name=='rahila-labs-frontend'].resourceGroup" -o tsv)
          az webapp config appsettings set -g $RG -n rahila-labs-frontend --settings SCM_DO_BUILD_DURING_DEPLOYMENT=false
          az webapp config set -g $RG -n rahila-labs-frontend --startup-file "node server.js"

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'rahila-labs-frontend'
          slot-name: 'Production'
          package: release.zip