name: Build and deploy Node.js app to Azure Web App - rahila-labs-web

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: npm install and build
        env:
          NEXT_PUBLIC_API_URL: https://rahila-labs-api.azurewebsites.net
        run: |
          npm install
          npm run build
          
          # Next.js 'standalone' output packaging
          cp -r public .next/standalone/ || true
          mkdir -p .next/standalone/.next
          cp -r .next/static .next/standalone/.next/
          
          # Disable Kudu Build
          echo "[config]" > .next/standalone/.deployment
          echo "SCM_DO_BUILD_DURING_DEPLOYMENT=false" >> .next/standalone/.deployment
          echo "ENABLE_ORYX_BUILD=false" >> .next/standalone/.deployment
          
          # Strip build/start scripts from standalone
          node -e "const fs=require('fs'); let p=require('./.next/standalone/package.json'); delete p.dependencies; delete p.devDependencies; p.scripts={'start':'node server.js'}; fs.writeFileSync('./.next/standalone/package.json',JSON.stringify(p,null,2))"

      - name: Zip artifact for deployment
        run: |
          cd .next/standalone
          zip -r ../../release.zip .

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip artifact
        run: unzip release.zip
        
      - name: Deploy using Publish Profile
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'rahila-labs-web'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_WEB }}
          package: .
