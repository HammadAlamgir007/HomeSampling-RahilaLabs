name: Build and deploy Python app to Azure Web App - rahila-labs-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Zip backend application
        run: |
          cd backend
          # Zip all backend files EXCEPT local virtual environments and caches
          zip -r ../release.zip . -x "venv/*" -x ".venv/*" -x "__pycache__/*" -x "*.pyc"
          cd ..
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Unzip artifact
        run: unzip release.zip

      - name: Deploy using Publish Profile
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'rahila-labs-api'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_API }}
          package: .
